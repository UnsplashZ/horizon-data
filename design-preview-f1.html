<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizon Data HUD - F1 Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght:600;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      font-family: 'Rajdhani', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px;
    }

    /* 主容器 */
    .hud-wrapper {
      display: flex;
      align-items: stretch;
      gap: 0;
    }

    /* 主HUD - F1风格扁平圆角矩形 */
    .main-hud {
      background: rgba(15, 15, 15, 0.85);
      backdrop-filter: blur(10px);
      padding: 28px 55px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.06);
      position: relative;
      /* 扁平圆角矩形 - 像F1那样横向宽，纵向扁 */
      border-radius: 35px;
      min-width: 650px;
    }

    /* 顶部细线装饰 */
    .main-hud::before {
      content: '';
      position: absolute;
      top: 0;
      left: 25%;
      right: 25%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-color, #00d4ff), transparent);
      opacity: 0.6;
    }

    /* 底部细线装饰 */
    .main-hud::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 30%;
      right: 30%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-color, #00d4ff), transparent);
      opacity: 0.4;
    }

    /* LED灯条 - 扁平方块 */
    .led-bar {
      display: flex;
      gap: 6px;
      padding: 4px 0;
    }

    .led {
      width: 24px;
      height: 6px;
      background: rgba(30, 30, 30, 0.8);
      border-radius: 1px;
      transition: all 0.08s;
    }

    .led.lit {
      background: var(--led-color, #00ff00);
      box-shadow: 0 0 4px var(--led-color, #00ff00);
    }

    .led.flash {
      animation: led-flash 0.12s ease-in-out infinite;
    }

    @keyframes led-flash {
      50% { opacity: 0.3; }
    }

    /* 三栏布局 */
    .three-columns {
      display: grid;
      grid-template-columns: 200px 140px 200px;
      gap: 30px;
      align-items: center;
    }

    /* 左侧RPM */
    .rpm-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .rpm-container {
      position: relative;
      width: 180px;
      height: 180px;
    }

    .rpm-label {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 600;
      color: #666;
      letter-spacing: 2px;
    }

    .rpm-number {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 38px;
      font-weight: 900;
      color: var(--accent-color, #00d4ff);
      letter-spacing: 0;
    }

    /* 中央档位 */
    .gear-section {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gear-display {
      font-size: 160px;
      font-weight: 900;
      line-height: 0.85;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    .gear-display.redline {
      color: #ff3333;
      animation: gear-pulse 0.15s ease-in-out infinite;
    }

    @keyframes gear-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* 右侧速度 */
    .speed-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .speed-container {
      width: 180px;
      height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
    }

    .speed-label {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .speed-number {
      font-size: 64px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -2px;
    }

    .speed-rpm-sub {
      font-size: 10px;
      font-weight: 600;
      color: #888;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* 底部双进度条 */
    .dual-bars {
      display: flex;
      gap: 20px;
      width: 100%;
      max-width: 520px;
    }

    .bar-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .bar-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #555;
      text-align: center;
    }

    .bar-track {
      height: 8px;
      background: rgba(20, 20, 20, 0.6);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      transition: width 0.12s;
      border-radius: 4px;
    }

    .bar-fill.brake {
      background: linear-gradient(90deg, #ff2244, #ff4466);
    }

    .bar-fill.throttle {
      background: linear-gradient(90deg, #00ff44, #00ff88);
    }

    /* 侧边栏 - 紧凑风格 */
    .side-panel {
      width: 220px;
      background: rgba(15, 15, 15, 0.85);
      backdrop-filter: blur(10px);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      margin: 0 8px;
      transition: all 0.3s;
    }

    .side-panel.collapsed {
      width: 0;
      padding: 0;
      margin: 0;
      border: none;
      opacity: 0;
      overflow: hidden;
    }

    .panel-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #666;
      text-align: center;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* 轮胎网格 */
    .tire-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .tire-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: rgba(0, 0, 0, 0.4);
      padding: 8px;
      border-radius: 6px;
    }

    .tire-label {
      font-size: 9px;
      font-weight: 700;
      color: #666;
      text-align: center;
      letter-spacing: 1px;
    }

    .tire-bar {
      height: 20px;
      border-radius: 4px;
      transition: all 0.3s;
    }

    .tire-temp {
      font-size: 15px;
      font-weight: 900;
      text-align: center;
      padding: 6px;
      border-radius: 4px;
      color: #000;
    }

    /* G力圆盘 */
    .g-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.4);
      position: relative;
      margin: 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .g-dot {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ff3333;
      border: 2px solid #fff;
      transform: translate(-50%, -50%);
      transition: all 0.06s;
      box-shadow: 0 0 8px rgba(255, 51, 51, 0.6);
    }

    .g-values {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
    }

    .g-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 700;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
    }

    .g-row span:first-child {
      color: #666;
      letter-spacing: 1px;
    }

    .g-row span:last-child {
      color: #fff;
      font-size: 12px;
    }

    /* 控制面板 */
    .controls {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(15, 15, 15, 0.95);
      backdrop-filter: blur(10px);
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      min-width: 220px;
    }

    .controls h3 {
      font-size: 13px;
      margin-bottom: 12px;
      color: #aaa;
      letter-spacing: 2px;
    }

    .control-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 11px;
    }

    .control-row label {
      color: #888;
      font-weight: 700;
    }

    button {
      background: rgba(40, 40, 40, 0.8);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 5px 12px;
      cursor: pointer;
      font-size: 10px;
      font-family: inherit;
      font-weight: 700;
      border-radius: 4px;
      transition: all 0.2s;
    }

    button:hover {
      background: rgba(60, 60, 60, 0.8);
      border-color: rgba(255, 255, 255, 0.2);
    }

    button.active {
      background: var(--accent-color, #00d4ff);
      border-color: var(--accent-color, #00d4ff);
      color: #000;
    }

    input[type="range"] {
      width: 110px;
    }
  </style>
</head>
<body>
  <div class="controls">
    <h3>DEMO CONTROLS</h3>
    <div class="control-row">
      <label>Auto</label>
      <button id="toggleAnim" class="active">ON</button>
    </div>
    <div class="control-row">
      <label>Left</label>
      <button id="toggleLeft" class="active">SHOW</button>
    </div>
    <div class="control-row">
      <label>Right</label>
      <button id="toggleRight" class="active">SHOW</button>
    </div>
    <div class="control-row" style="margin-top: 12px; color: #555;">
      <label>Manual:</label>
    </div>
    <div class="control-row">
      <label>RPM %</label>
      <input type="range" id="rpmSlider" min="0" max="100" value="0">
    </div>
  </div>

  <div class="hud-wrapper">
    <!-- 左侧：轮胎 -->
    <div class="side-panel" id="leftPanel">
      <div class="panel-title">TIRES</div>
      <div class="tire-grid">
        <div class="tire-item">
          <div class="tire-label">FL</div>
          <div class="tire-bar" style="background: #00ff44;"></div>
          <div class="tire-temp" style="background: #34e39a;">88°</div>
        </div>
        <div class="tire-item">
          <div class="tire-label">FR</div>
          <div class="tire-bar" style="background: #00ff44;"></div>
          <div class="tire-temp" style="background: #34e39a;">91°</div>
        </div>
        <div class="tire-item">
          <div class="tire-label">RL</div>
          <div class="tire-bar" style="background: #aaff00;"></div>
          <div class="tire-temp" style="background: #ffaa44;">102°</div>
        </div>
        <div class="tire-item">
          <div class="tire-label">RR</div>
          <div class="tire-bar" style="background: #aaff00;"></div>
          <div class="tire-temp" style="background: #ffaa44;">104°</div>
        </div>
      </div>
    </div>

    <!-- 主HUD -->
    <div class="main-hud">
      <!-- LED灯条 -->
      <div class="led-bar" id="ledBar"></div>

      <!-- 三栏 -->
      <div class="three-columns">
        <!-- 左：RPM -->
        <div class="rpm-section">
          <div class="rpm-container">
            <canvas id="rpmCanvas" width="180" height="180"></canvas>
            <div class="rpm-label">RPM</div>
            <div class="rpm-number" id="rpmNumber">0</div>
          </div>
        </div>

        <!-- 中：档位 -->
        <div class="gear-section">
          <div class="gear-display" id="gearDisplay">N</div>
        </div>

        <!-- 右：速度 -->
        <div class="speed-section">
          <div class="speed-container">
            <div class="speed-label">KPH</div>
            <div class="speed-number" id="speedValue">0</div>
            <div class="speed-rpm-sub">RPM <span id="rpmSub">0</span></div>
          </div>
        </div>
      </div>

      <!-- 双进度条 -->
      <div class="dual-bars">
        <div class="bar-wrapper">
          <div class="bar-label">BRAKE</div>
          <div class="bar-track">
            <div class="bar-fill brake" id="brakeBar" style="width: 0%;"></div>
          </div>
        </div>
        <div class="bar-wrapper">
          <div class="bar-label">THROTTLE</div>
          <div class="bar-track">
            <div class="bar-fill throttle" id="throttleBar" style="width: 0%;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 右侧：G力 -->
    <div class="side-panel" id="rightPanel">
      <div class="panel-title">G-FORCE</div>
      <div class="g-circle">
        <svg viewBox="0 0 100 100" style="width: 100%; height: 100%;">
          <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
          <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
          <line x1="5" y1="50" x2="95" y2="50" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
          <line x1="50" y1="5" x2="50" y2="95" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
        </svg>
        <div class="g-dot" id="gDot" style="left: 50%; top: 50%;"></div>
      </div>
      <div class="g-values">
        <div class="g-row">
          <span>LAT</span>
          <span id="gx">0.00</span>
        </div>
        <div class="g-row">
          <span>LONG</span>
          <span id="gz">0.00</span>
        </div>
        <div class="g-row">
          <span>TOTAL</span>
          <span id="gtotal">0.00</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 颜色映射 - F1风格，克制的颜色
    function getRpmColor(percent) {
      if (percent < 0.4) return '#00d4ff';
      if (percent < 0.6) return '#00ff44';
      if (percent < 0.75) return '#ffee00';
      if (percent < 0.9) return '#ff8800';
      return '#ff3333';
    }

    // 更新主题色
    function updateThemeColor(percent) {
      const color = getRpmColor(percent);
      document.documentElement.style.setProperty('--accent-color', color);
      document.documentElement.style.setProperty('--led-color', color);
    }

    // 初始化LED - 扁平方块
    const ledBar = document.getElementById('ledBar');
    const LED_COUNT = 14;
    for (let i = 0; i < LED_COUNT; i++) {
      const led = document.createElement('div');
      led.className = 'led';
      led.id = `led${i}`;
      ledBar.appendChild(led);
    }

    // Canvas绘制RPM - 细圆弧
    const canvas = document.getElementById('rpmCanvas');
    const ctx = canvas.getContext('2d');
    const centerX = 90;
    const centerY = 90;
    const radius = 82;
    const lineWidth = 8;

    function drawRpmArc(percent) {
      ctx.clearRect(0, 0, 180, 180);

      // 背景圆弧
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0.65 * Math.PI, 2.35 * Math.PI);
      ctx.lineWidth = lineWidth;
      ctx.lineCap = 'round';
      ctx.strokeStyle = 'rgba(40, 40, 40, 0.5)';
      ctx.stroke();

      if (percent > 0.01) {
        const startAngle = 0.65 * Math.PI;
        const endAngle = startAngle + percent * 1.7 * Math.PI;
        const color = getRpmColor(percent);

        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, startAngle, endAngle);
        ctx.lineWidth = lineWidth;
        ctx.lineCap = 'round';
        ctx.strokeStyle = color;
        ctx.stroke();
      }
    }

    // 更新LED
    function updateLeds(percent) {
      const lit = Math.round(percent * LED_COUNT);
      const nearRedline = percent > 0.9;

      for (let i = 0; i < LED_COUNT; i++) {
        const led = document.getElementById(`led${i}`);
        if (i < lit) {
          led.classList.add('lit');
          if (nearRedline) led.classList.add('flash');
          else led.classList.remove('flash');
        } else {
          led.classList.remove('lit', 'flash');
        }
      }
    }

    // 动画
    let animating = true;
    let time = 0;

    function animate() {
      if (!animating) return;

      time += 0.01;

      const cycle = Math.sin(time * 0.5) * 0.5 + 0.5;
      const rpmPercent = Math.pow(cycle, 1.3);
      const rpm = Math.round(rpmPercent * 11022);
      const speed = Math.round(rpmPercent * 272);
      const gear = Math.min(7, Math.floor(rpmPercent * 8));
      const throttle = Math.round(rpmPercent * 100);
      const brake = Math.round((1 - rpmPercent) * 25);

      // 更新颜色
      updateThemeColor(rpmPercent);
      drawRpmArc(rpmPercent);
      updateLeds(rpmPercent);

      // 数值
      document.getElementById('rpmNumber').textContent = rpm;
      document.getElementById('speedValue').textContent = speed;
      document.getElementById('rpmSub').textContent = rpm;
      document.getElementById('gearDisplay').textContent = gear === 0 ? 'N' : gear;
      document.getElementById('throttleBar').style.width = throttle + '%';
      document.getElementById('brakeBar').style.width = brake + '%';

      // 红线
      const gearDisplay = document.getElementById('gearDisplay');
      if (rpmPercent > 0.9) {
        gearDisplay.classList.add('redline');
      } else {
        gearDisplay.classList.remove('redline');
      }

      // G力
      const gx = (Math.sin(time * 2.0) * 1.9).toFixed(2);
      const gz = (Math.cos(time * 1.8) * 1.5).toFixed(2);
      const gtotal = Math.sqrt(gx*gx + gz*gz).toFixed(2);
      document.getElementById('gx').textContent = gx;
      document.getElementById('gz').textContent = gz;
      document.getElementById('gtotal').textContent = gtotal;

      const dotX = 50 + (gx / 3) * 45;
      const dotY = 50 - (gz / 3) * 45;
      document.getElementById('gDot').style.left = dotX + '%';
      document.getElementById('gDot').style.top = dotY + '%';

      requestAnimationFrame(animate);
    }

    // 手动控制
    document.getElementById('rpmSlider').addEventListener('input', (e) => {
      if (animating) return;
      const percent = e.target.value / 100;
      const rpm = Math.round(percent * 11022);
      updateThemeColor(percent);
      drawRpmArc(percent);
      updateLeds(percent);
      document.getElementById('rpmNumber').textContent = rpm;
    });

    // 按钮
    document.getElementById('toggleAnim').addEventListener('click', (e) => {
      animating = !animating;
      e.target.textContent = animating ? 'ON' : 'OFF';
      e.target.classList.toggle('active');
      if (animating) animate();
    });

    document.getElementById('toggleLeft').addEventListener('click', (e) => {
      const panel = document.getElementById('leftPanel');
      panel.classList.toggle('collapsed');
      e.target.textContent = panel.classList.contains('collapsed') ? 'HIDE' : 'SHOW';
      e.target.classList.toggle('active');
    });

    document.getElementById('toggleRight').addEventListener('click', (e) => {
      const panel = document.getElementById('rightPanel');
      panel.classList.toggle('collapsed');
      e.target.textContent = panel.classList.contains('collapsed') ? 'HIDE' : 'SHOW';
      e.target.classList.toggle('active');
    });

    // 启动
    updateThemeColor(0);
    drawRpmArc(0);
    animate();
  </script>
</body>
</html>
